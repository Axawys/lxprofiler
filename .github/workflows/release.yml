name: release

# Пуш тега vX.Y.Z собирает бинарники под linux amd64/arm64 и публикует релиз.
# Тогда `lxprofile --update` и install.sh смогут их скачать.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          go build -trimpath \
            -ldflags "-s -w -X main.Version=${VER}" \
            -o "lxprofile-linux-${GOARCH}" ./cmd/lxprofile

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: lxprofile-linux-${{ matrix.goarch }}
          generate_release_notes: true
