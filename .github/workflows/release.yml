name: release

# Пуш тега vX.Y.Z собирает бинарники под linux amd64/arm64 и публикует релиз.
# Тогда `lxprofile --update` и install.sh смогут их скачать.
# Обе архитектуры собираются в одной джобе: два параллельных вызова
# action-gh-release на один тег могут гонкой продублировать/уронить релиз.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all architectures
        env:
          CGO_ENABLED: '0'
        run: |
          VER="${GITHUB_REF_NAME#v}"
          for arch in amd64 arm64; do
            GOOS=linux GOARCH=$arch go build -trimpath \
              -ldflags "-s -w -X main.Version=${VER}" \
              -o "lxprofile-linux-${arch}" ./cmd/lxprofile
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lxprofile-linux-amd64
            lxprofile-linux-arm64
          generate_release_notes: true
